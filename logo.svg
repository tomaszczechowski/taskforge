<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Jira ticket (left) -->
  <rect x="20" y="70" width="45" height="60" rx="4" fill="#0052CC" stroke="#333" stroke-width="1.5"/>
  <rect x="25" y="75" width="35" height="8" fill="#fff" opacity="0.7"/>
  <line x1="25" y1="88" x2="60" y2="88" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <line x1="25" y1="93" x2="60" y2="93" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <line x1="25" y1="98" x2="55" y2="98" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <line x1="25" y1="103" x2="50" y2="103" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <circle cx="32" cy="115" r="3" fill="#FF5630"/>

  <!-- Agent robot (center) -->
  <g transform="translate(100, 100)">
    <!-- Head -->
    <rect x="-12" y="-15" width="24" height="20" rx="3" fill="#9F7AEA" stroke="#333" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-8" r="2" fill="#333"/>
    <circle cx="6" cy="-8" r="2" fill="#333"/>
    <!-- Smile -->
    <path d="M -4 -2 Q 0 1 4 -2" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- Body -->
    <rect x="-10" y="6" width="20" height="18" rx="2" fill="#68D391" stroke="#333" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="-10" y1="10" x2="-18" y2="8" stroke="#333" stroke-width="2"/>
    <line x1="10" y1="10" x2="18" y2="8" stroke="#333" stroke-width="2"/>
    <!-- Hands -->
    <circle cx="-18" cy="8" r="2.5" fill="#9F7AEA"/>
    <circle cx="18" cy="8" r="2.5" fill="#9F7AEA"/>
  </g>

  <!-- GitHub PR (right) -->
  <rect x="135" y="70" width="45" height="60" rx="4" fill="#24292E" stroke="#333" stroke-width="1.5"/>
  <circle cx="147" cy="82" r="3" fill="#28a745"/>
  <line x1="155" y1="80" x2="172" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="155" y1="88" x2="172" y2="88" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="155" y1="96" x2="172" y2="96" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="155" y1="104" x2="165" y2="104" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <rect x="142" y="110" width="28" height="12" rx="2" fill="#28a745" stroke="#fff" stroke-width="1"/>
  <text x="156" y="117" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">MERGE</text>

  <!-- Arrows showing flow -->
  <path d="M 67 100 L 80 100" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 120 100 L 133 100" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
</svg>